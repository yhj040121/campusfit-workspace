<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusFit Web</title>
  <meta name="description" content="CampusFit Web 版，和当前 app 同步的校园穿搭、活动与发布体验。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar__inner">
        <button id="brandButton" class="brand" type="button" aria-label="返回首页">
          <span class="brand__mark">青</span>
          <span class="brand__text">
            <strong>CampusFit Web</strong>
            <span>和当前 app 同步的校园穿搭站</span>
          </span>
        </button>

        <nav id="pageNav" class="page-nav" aria-label="页面导航"></nav>

        <div class="topbar__actions">
          <label class="search-field" for="globalSearchInput">
            <span class="search-field__icon">⌕</span>
            <input id="globalSearchInput" type="search" placeholder="搜索校园穿搭、场景或活动">
          </label>
          <button id="refreshButton" class="ghost-button ghost-button--compact" type="button">刷新</button>
          <button id="authButton" class="primary-button primary-button--compact" type="button">登录</button>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section id="statusPanel" class="panel"></section>
        <section id="quickPanel" class="panel"></section>
      </aside>

      <section class="main-stage">
        <div id="pageContent"></div>
      </section>
    </main>

    <nav id="mobileNav" class="mobile-nav" aria-label="移动端页面导航"></nav>
  </div>

  <input id="imagePicker" class="visually-hidden" type="file" accept="image/*" multiple>
  <div id="drawerRoot"></div>
  <div id="toastRoot" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
